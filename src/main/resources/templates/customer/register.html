<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Customer Register — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="gradient-bg">
    <div th:replace="~{fragments/customer-navbar :: navbar}"></div>

    <div class="container d-flex justify-content-center align-items-center fade-in" style="min-height: calc(100vh - 65px);">
        <div class="glass-card p-5" style="width: 100%; max-width: 480px; margin: 40px 0;">
            <div class="text-center mb-4">
                <div class="sidebar-brand-icon mx-auto mb-3">🍽️</div>
                <h4 style="font-weight:800;color:var(--text-dark);">Create an Account</h4>
                <p style="font-size:13px;color:var(--text-muted);">Join to start ordering online</p>
            </div>

            <div th:if="${error}" class="alert-custom alert-danger mb-3">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/customer/register}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
                <div class="mb-3">
                    <label class="form-label-custom">Full Name</label>
                    <input type="text" name="name" class="form-control-custom" required autofocus placeholder="John Doe"/>
                </div>

                <div class="mb-3">
                    <label class="form-label-custom">Email Address</label>
                    <input type="email" name="email" class="form-control-custom" required placeholder="john@example.com"/>
                </div>

                <div class="mb-3">
                    <label class="form-label-custom">Phone Number</label>
                    <input type="text" name="phone" class="form-control-custom" required placeholder="+1 234 567 8900"/>
                </div>

                <div class="mb-4">
                    <label class="form-label-custom">Password</label>
                    <input type="password" name="password" class="form-control-custom" required placeholder="••••••••"/>
                </div>

                <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="padding:12px;">
                    Register Now
                </button>
            </form>

            <div class="text-center mt-4" style="font-size:13px;">
                Already have an account? <a href="/login" style="color:var(--primary);font-weight:700;text-decoration:none;">Log In</a>
            </div>
        </div>
    </div>
</body>
</html>
