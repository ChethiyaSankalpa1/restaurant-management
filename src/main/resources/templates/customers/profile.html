<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Customer Profile — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h4 style="font-weight:800;margin:0;">👤 Customer Profile</h4>
            <a href="/customers" class="btn-primary-custom btn-info-custom"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="content-card" style="text-align:center;padding:32px;">
                    <div style="width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#6f42c1,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:800;margin:0 auto 20px;"
                         th:text="${!#strings.isEmpty(customer.name)} ? ${#strings.toUpperCase(#strings.substring(customer.name,0,1))} : 'U'">A</div>
                    <h4 style="font-weight:800;margin-bottom:4px;" th:text="${customer.name}">Name</h4>
                    <p style="color:#6c757d;margin-bottom:16px;" th:text="${customer.email} ?: 'No email'">email</p>
                    <span class="badge-status" th:text="${customer.status}" th:classappend="${customer.status == 'active'} ? ' badge-active' : ' badge-inactive'">active</span>
                    <hr style="margin:20px 0;"/>
                    <div class="text-start">
                        <div class="mb-2"><i class="fas fa-phone me-2" style="color:#6f42c1;"></i><span th:text="${customer.phone} ?: '—'">-</span></div>
                        <div class="mb-2"><i class="fas fa-map-marker-alt me-2" style="color:#6f42c1;"></i><span th:text="${customer.address} ?: '—'">-</span></div>
                    </div>
                </div>

                <!-- Loyalty Info -->
                <div class="content-card mt-3" style="background:linear-gradient(135deg,#4a235a,#6f42c1);color:#fff;border:none;">
                    <div class="card-body-custom">
                        <h6 style="color:rgba(255,255,255,.7);font-size:11px;text-transform:uppercase;letter-spacing:.05em;">Loyalty Program</h6>
                        <div style="font-size:30px;font-weight:900;margin:8px 0;" th:text="${customer.loyaltyPoints} ?: 0">0</div>
                        <div style="font-size:13px;color:rgba(255,255,255,.8);">Points available</div>
                        <div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,.6);">1 point per $1 spent · Redeem: $0.10/point</div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="row g-2 mt-1">
                    <div class="col-6"><div class="stat-card purple" style="padding:14px;">
                        <div class="stat-value" style="font-size:22px;" th:text="${customer.totalOrders} ?: 0">0</div>
                        <div class="stat-label">Orders</div>
                    </div></div>
                    <div class="col-6"><div class="stat-card green" style="padding:14px;">
                        <div class="stat-value" style="font-size:22px;"><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(customer.totalSpent ?: 0,1,2)}">0</span></div>
                        <div class="stat-label">Total Spent</div>
                    </div></div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="content-card">
                    <div class="card-header-custom"><h5><i class="fas fa-history me-2" style="color:#6f42c1;"></i>Order History</h5></div>
                    <div style="overflow-x:auto;">
                        <table class="table-custom">
                            <thead><tr><th>ORDER #</th><th>TYPE</th><th>STATUS</th><th>TOTAL</th><th>DATE</th><th></th></tr></thead>
                            <tbody>
                                <tr th:each="o : ${orders}">
                                    <td><strong style="color:#6f42c1;" th:text="${o.orderNumber}">-</strong></td>
                                    <td th:text="${o.type}">DineIn</td>
                                    <td><span class="badge-status badge-completed" th:text="${o.status}">-</span></td>
                                    <td class="text-money"><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(o.totalAmount ?: 0,1,2)}">0</span></td>
                                    <td style="font-size:12px;color:#6c757d;" th:text="${#temporals.format(o.createdAt,'dd MMM yyyy')} ?: '-'">-</td>
                                    <td><a th:href="@{/orders/{id}(id=${o.id})}" class="btn-sm-action btn-sm-view"><i class="fas fa-eye"></i></a></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(orders)}">
                                    <td colspan="6" style="text-align:center;padding:30px;color:#6c757d;">No orders found for this customer.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
