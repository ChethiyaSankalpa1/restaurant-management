<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Customers — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-xl-3">
                <div class="stat-card purple"><div class="stat-card-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" th:text="${totalCustomers}">0</div><div class="stat-label">Total Customers</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card green"><div class="stat-card-icon"><i class="fas fa-user-check"></i></div>
                    <div class="stat-value" th:text="${activeCustomers}">0</div><div class="stat-label">Active Customers</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card cyan"><div class="stat-card-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-value">$<span th:text="${#numbers.formatDecimal(totalRevenue,1,2)}">0</span></div><div class="stat-label">Total Revenue</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card yellow"><div class="stat-card-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-value">$<span th:text="${#numbers.formatDecimal(avgOrderValue,1,2)}">0</span></div><div class="stat-label">Avg Order Value</div></div>
            </div>
        </div>

        <!-- Actions -->
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <form th:action="@{/customers}" method="get" class="d-flex gap-2">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" name="search" class="form-control-custom" placeholder="Search customers..." th:value="${search}" style="min-width:200px;"/>
                </div>
                <button type="submit" class="btn-primary-custom">Search</button>
            </form>
            <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
                <i class="fas fa-plus"></i> Add Customer
            </button>
        </div>

        <!-- Customers Table -->
        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-users me-2" style="color:#6f42c1;"></i>Customer Directory (<span th:text="${customers.size()}">0</span>)</h5>
            </div>
            <div style="overflow-x:auto;">
                <table class="table-custom">
                    <thead>
                        <tr><th>NAME</th><th>PHONE</th><th>EMAIL</th><th>ORDERS</th><th>TOTAL SPENT</th><th>LOYALTY PTS</th><th>STATUS</th><th>ACTIONS</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${customers}">
                            <td>
                                <div style="display:flex;align-items:center;gap:10px;">
                                    <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6f42c1,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;"
                                         th:text="${!#strings.isEmpty(c.name)} ? ${#strings.toUpperCase(#strings.substring(c.name,0,1))} : 'U'">A</div>
                                    <div>
                                        <a th:href="@{/customers/{id}(id=${c.id})}" style="font-weight:700;color:#2d3748;text-decoration:none;" th:text="${c.name}">Name</a>
                                        <div style="font-size:11px;color:#6c757d;" th:text="${c.address} ?: '—'">Address</div>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${c.phone} ?: '—'">-</td>
                            <td th:text="${c.email} ?: '—'">-</td>
                            <td><strong th:text="${c.totalOrders} ?: 0">0</strong></td>
                            <td class="text-money">$<span th:text="${#numbers.formatDecimal(c.totalSpent ?: 0,1,2)}">0.00</span></td>
                            <td><span style="background:#f3e8ff;color:#6f42c1;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;" th:text="${c.loyaltyPoints} ?: 0">0</span></td>
                            <td><span class="badge-status" th:text="${c.status}" th:classappend="${c.status == 'active'} ? ' badge-active' : ' badge-inactive'">active</span></td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/customers/{id}(id=${c.id})}" class="btn-sm-action btn-sm-view"><i class="fas fa-eye"></i></a>
                                    <form th:action="@{/customers/delete/{id}(id=${c.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action btn-sm-delete" onclick="return confirm('Delete?')"><i class="fas fa-trash-alt"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(customers)}">
                            <td colspan="8" style="text-align:center;padding:40px;color:#6c757d;">No customers found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;"><h5 style="font-weight:700;margin:0;">Add Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/customers/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body" style="padding:20px;">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label-custom">Full Name *</label>
                            <input type="text" name="name" class="form-control-custom" required/></div>
                        <div class="col-6"><label class="form-label-custom">Phone</label>
                            <input type="text" name="phone" class="form-control-custom"/></div>
                        <div class="col-6"><label class="form-label-custom">Email</label>
                            <input type="email" name="email" class="form-control-custom"/></div>
                        <div class="col-12"><label class="form-label-custom">Address</label>
                            <input type="text" name="address" class="form-control-custom"/></div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:12px 20px;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
