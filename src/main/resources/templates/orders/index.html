<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Orders — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <!-- System Status Bar -->
        <div style="background:linear-gradient(135deg,#4a235a,#6f42c1);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;">
            <div style="color:#fff;display:flex;align-items:center;gap:8px;">
                <i class="fas fa-receipt"></i>
                <span style="font-size:13px;">Total: <strong th:text="${totalCount}">0</strong></span>
            </div>
            <div style="color:#ffc107;display:flex;align-items:center;gap:8px;">
                <i class="fas fa-clock"></i>
                <span style="background:#ffc107;color:#000;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;" th:text="|Pending: ${pendingCount}|">Pending: 0</span>
            </div>
            <div style="color:#28a745;display:flex;align-items:center;gap:8px;margin-left:auto;">
                <i class="fas fa-dollar-sign"></i>
                <span style="background:#28a745;color:#fff;padding:2px 12px;border-radius:12px;font-size:13px;font-weight:700;">
                    Revenue: $<span th:text="${#numbers.formatDecimal(todayRevenue,1,2)}">0.00</span>
                </span>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-xl-3">
                <div class="stat-card yellow">
                    <div class="stat-card-icon"><i class="fas fa-hourglass-half"></i></div>
                    <div class="stat-value" th:text="${pendingCount}">0</div>
                    <div class="stat-label">Pending Orders</div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card purple">
                    <div class="stat-card-icon"><i class="fas fa-fire"></i></div>
                    <div class="stat-value" th:text="${preparingCount}">0</div>
                    <div class="stat-label">Preparing</div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card green">
                    <div class="stat-card-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-value" th:text="${readyCount}">0</div>
                    <div class="stat-label">Ready</div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card cyan">
                    <div class="stat-card-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-value">$<span th:text="${#numbers.formatDecimal(todayRevenue,1,2)}">0</span></div>
                    <div class="stat-label">Today's Revenue</div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="content-card mb-4">
            <div class="card-body-custom">
                <form th:action="@{/orders}" method="get" class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label-custom">Order Type</label>
                        <select name="type" class="form-control-custom">
                            <option value="">All Types</option>
                            <option value="DineIn" th:selected="${filterType == 'DineIn'}">Dine In</option>
                            <option value="Takeaway" th:selected="${filterType == 'Takeaway'}">Takeaway</option>
                            <option value="Delivery" th:selected="${filterType == 'Delivery'}">Delivery</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label-custom">Status</label>
                        <select name="status" class="form-control-custom">
                            <option value="">All Statuses</option>
                            <option value="Pending" th:selected="${filterStatus == 'Pending'}">Pending</option>
                            <option value="Preparing" th:selected="${filterStatus == 'Preparing'}">Preparing</option>
                            <option value="Ready" th:selected="${filterStatus == 'Ready'}">Ready</option>
                            <option value="Completed" th:selected="${filterStatus == 'Completed'}">Completed</option>
                            <option value="Cancelled" th:selected="${filterStatus == 'Cancelled'}">Cancelled</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label-custom">Source</label>
                        <select name="source" class="form-control-custom">
                            <option value="">All Sources</option>
                            <option value="Online" th:selected="${filterSource == 'Online'}">Online</option>
                            <option value="Physical" th:selected="${filterSource == 'Physical'}">Physical</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-primary-custom flex-fill justify-content-center">
                                <i class="fas fa-filter"></i> Filter
                            </button>
                            <a href="/orders" class="btn-primary-custom btn-info-custom justify-content-center">
                                <i class="fas fa-times"></i>
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-list me-2" style="color:#6f42c1;"></i>Orders
                    <span class="badge" style="background:#6f42c1;color:#fff;border-radius:8px;font-size:11px;" th:text="${orders.size()}">0</span>
                </h5>
                <div class="d-flex gap-2">
                    <a href="/pos" class="btn-primary-custom" style="font-size:12px;padding:6px 14px;">
                        <i class="fas fa-plus"></i> New Order
                    </a>
                    <button class="btn-primary-custom btn-info-custom" style="font-size:12px;padding:6px 14px;" onclick="toggleAutoRefresh()">
                        <i class="fas fa-sync-alt" id="refresh-icon"></i> Auto Refresh
                    </button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table class="table-custom">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"/></th>
                            <th>ORDER #</th><th>CUSTOMER</th><th>TYPE</th><th>SOURCE</th>
                            <th>STATUS</th><th>PAYMENT</th><th>TOTAL</th><th>DATE</th><th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td><input type="checkbox" class="order-check" th:value="${order.id}"/></td>
                            <td><strong style="color:#6f42c1;" th:text="${order.orderNumber}">ORD-001</strong></td>
                            <td th:text="${order.customerName} ?: 'Walk-in'">Customer</td>
                            <td>
                                <span class="badge-status"
                                      th:text="${order.type}"
                                      th:classappend="|${order.type == 'DineIn'} ? ' badge-dinein' : (${order.type == 'Takeaway'} ? ' badge-takeaway' : ' badge-delivery')|">Type</span>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:text="${order.source}"
                                      th:classappend="${order.source == 'Online'} ? ' badge-online' : ' badge-physical'">Source</span>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:text="${order.status}"
                                      th:classappend="|${order.status == 'Completed'} ? ' badge-completed' : (${order.status == 'Pending'} ? ' badge-pending' : (${order.status == 'Preparing'} ? ' badge-preparing' : (${order.status == 'Ready'} ? ' badge-ready' : ' badge-cancelled')))|">Status</span>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:text="${order.paymentStatus}"
                                      th:classappend="${order.paymentStatus == 'Paid'} ? ' badge-paid' : ' badge-pending'">Payment</span>
                            </td>
                            <td class="text-money">$<span th:text="${order.totalAmount} ?: '0.00'">0.00</span></td>
                            <td style="font-size:12px;color:#6c757d;" th:text="${#temporals.format(order.createdAt, 'dd MMM HH:mm')} ?: '-'">-</td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/orders/{id}(id=${order.id})}" class="btn-sm-action btn-sm-view" title="View">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <button class="btn-sm-action btn-sm-edit" title="Update Status"
                                            th:data-id="${order.id}"
                                            onclick="updateOrderStatusFromEl(this)">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post" style="display:inline;">
                                        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="reason" value="Cancelled by staff"/>
                                        <button type="submit" class="btn-sm-action btn-sm-delete" title="Cancel"
                                                th:disabled="${order.status == 'Completed' || order.status == 'Cancelled'}"
                                                onclick="return confirm('Cancel this order?')">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="10" style="text-align:center;padding:40px;color:#6c757d;">
                                <i class="fas fa-inbox fa-3x mb-3" style="opacity:.3;display:block;"></i>
                                No orders found. Try adjusting filters.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Update Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;border-bottom:1px solid #e2e8f0;">
                <h6 class="modal-title" style="font-weight:700;">Update Order Status</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding:20px;">
                <div class="d-grid gap-2">
                    <button class="btn btn-warning" onclick="doUpdateStatus('Pending')">⏳ Pending</button>
                    <button class="btn btn-primary" onclick="doUpdateStatus('Preparing')">🔥 Preparing</button>
                    <button class="btn btn-info text-white" onclick="doUpdateStatus('Ready')">✅ Ready</button>
                    <button class="btn btn-success" onclick="doUpdateStatus('Completed')">🎉 Completed</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
let currentOrderId = '';
let autoRefreshTimer;

function updateOrderStatusFromEl(btn) {
    updateOrderStatus(btn.dataset.id);
}
function updateOrderStatus(orderId) {
    currentOrderId = orderId;
    new bootstrap.Modal(document.getElementById('statusModal')).show();
}

function doUpdateStatus(status) {
    $.post('/orders/' + currentOrderId + '/status', { status: status, _csrf: $('input[name="_csrf"]').val() || '' }, (data) => {
        if (data.success) { location.reload(); }
    }).fail(() => alert('Failed to update status'));
}

function toggleSelectAll(cb) {
    document.querySelectorAll('.order-check').forEach(c => c.checked = cb.checked);
}

let autoOn = false;
function toggleAutoRefresh() {
    autoOn = !autoOn;
    if (autoOn) {
        autoRefreshTimer = setInterval(() => location.reload(), 30000);
        document.getElementById('refresh-icon').style.animation = 'spin 1s linear infinite';
    } else {
        clearInterval(autoRefreshTimer);
        document.getElementById('refresh-icon').style.animation = '';
    }
}
</script>
</body>
</html>
