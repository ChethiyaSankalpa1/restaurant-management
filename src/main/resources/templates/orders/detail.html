<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Order Detail — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h4 style="font-weight:800;margin:0;">Order Details</h4>
                <p style="margin:0;color:#6c757d;font-size:13px;" th:text="'Order # ' + ${order.orderNumber}">-</p>
            </div>
            <div class="d-flex gap-2">
                <a href="/orders" class="btn-primary-custom btn-info-custom"><i class="fas fa-arrow-left"></i> Back</a>
                <button class="btn-primary-custom" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
            </div>
        </div>

        <div class="row g-4">
            <!-- Order Info -->
            <div class="col-md-8">
                <div class="content-card mb-4">
                    <div class="card-header-custom">
                        <h5><i class="fas fa-receipt me-2" style="color:#6f42c1;"></i>Order Items</h5>
                        <span class="badge-status"
                              th:text="${order.status}"
                              th:classappend="|${order.status == 'Completed'} ? ' badge-completed' : (${order.status == 'Pending'} ? ' badge-pending' : (${order.status == 'Preparing'} ? ' badge-preparing' : (${order.status == 'Ready'} ? ' badge-ready' : ' badge-cancelled')))|">Status</span>
                    </div>
                    <div style="overflow-x:auto;">
                        <table class="table-custom">
                            <thead><tr><th>#</th><th>ITEM</th><th>QTY</th><th>UNIT PRICE</th><th>SUBTOTAL</th><th>STATUS</th></tr></thead>
                            <tbody>
                                <tr th:each="item,i : ${order.items}">
                                    <td th:text="${i.index + 1}">1</td>
                                    <td><strong th:text="${item.name}">Item</strong></td>
                                    <td th:text="${item.quantity}">1</td>
                                    <td>$<span th:text="${item.price}">0.00</span></td>
                                    <td class="text-money">$<span th:text="${item.subtotal}">0.00</span></td>
                                    <td><span class="badge-status badge-pending" th:text="${item.status} ?: 'Pending'">Pending</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Totals -->
                    <div style="padding:16px 20px;background:#f8f9ff;border-top:1px solid #e2e8f0;">
                        <div style="max-width:280px;margin-left:auto;">
                            <div class="d-flex justify-content-between mb-2">
                                <span style="color:#6c757d;">Subtotal</span>
                                <span>$<span th:text="${order.items != null ? order.items.stream().mapToDouble(i -> i.subtotal ?: 0).sum() : 0}">0</span></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span style="color:#6c757d;">Tax</span>
                                <span>$<span th:text="${#numbers.formatDecimal(order.taxAmount ?: 0,1,2)}">0</span></span>
                            </div>
                            <div th:if="${order.loyaltyDiscount != null and order.loyaltyDiscount > 0}" class="d-flex justify-content-between mb-2">
                                <span style="color:#28a745;">Loyalty Discount</span>
                                <span style="color:#28a745;">-$<span th:text="${#numbers.formatDecimal(order.loyaltyDiscount,1,2)}">0</span></span>
                            </div>
                            <div class="d-flex justify-content-between" style="font-size:17px;font-weight:800;padding-top:10px;border-top:1px solid #e2e8f0;">
                                <span>Total</span>
                                <span class="text-money">$<span th:text="${#numbers.formatDecimal(order.totalAmount ?: 0,1,2)}">0</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar info -->
            <div class="col-md-4">
                <div class="content-card mb-3">
                    <div class="card-header-custom"><h5>Order Info</h5></div>
                    <div class="card-body-custom">
                        <div class="mb-3">
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;margin-bottom:4px;">Customer</div>
                            <div style="font-weight:700;" th:text="${order.customerName} ?: 'Walk-in'">Walk-in</div>
                        </div>
                        <div class="mb-3">
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;margin-bottom:4px;">Order Type</div>
                            <span class="badge-status badge-dinein" th:text="${order.type}">DineIn</span>
                        </div>
                        <div class="mb-3">
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;margin-bottom:4px;">Source</div>
                            <span th:text="${order.source} ?: 'Physical'">Physical</span>
                        </div>
                        <div class="mb-3">
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;margin-bottom:4px;">Payment</div>
                            <div style="font-weight:700;" th:text="${order.paymentMethod} ?: '—'">Cash</div>
                            <span class="badge-status" th:text="${order.paymentStatus}" th:classappend="${order.paymentStatus == 'Paid'} ? ' badge-paid' : ' badge-pending'">Pending</span>
                        </div>
                        <div class="mb-3" th:if="${order.tableNumber != null}">
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;margin-bottom:4px;">Table</div>
                            <div style="font-weight:700;">Table <span th:text="${order.tableNumber}">1</span></div>
                        </div>
                        <div class="mb-3" th:if="${order.notes != null and !order.notes.isEmpty()}">
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;margin-bottom:4px;">Notes</div>
                            <div style="font-size:13px;color:#6c757d;" th:text="${order.notes}">-</div>
                        </div>
                        <div>
                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;margin-bottom:4px;">Created</div>
                            <div style="font-size:13px;color:#6c757d;" th:text="${#temporals.format(order.createdAt,'dd MMM yyyy HH:mm')} ?: '-'">-</div>
                        </div>
                    </div>
                </div>

                <!-- Update Status -->
                <div class="content-card">
                    <div class="card-header-custom"><h5>Update Status</h5></div>
                    <div class="card-body-custom">
                        <div class="d-grid gap-2">
                            <button th:each="st : ${ {'Pending','Preparing','Ready','Completed','Paid'} }"
                                    class="btn btn-outline-secondary"
                                    th:classappend="${order.status == st} ? ' active bg-light fw-bold' : ''"
                                    th:text="${st}"
                                    th:data-st="${st}"
                                    onclick="updateStatusFromEl(this)">Status</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
const orderId = /*[[${order.id}]]*/ '';
function updateStatusFromEl(btn) {
    updateStatus(btn.dataset.st);
}
function updateStatus(status) {
    $.post('/orders/' + orderId + '/status', { status: status }, (data) => {
        if (data.success) location.reload();
    });
}
</script>
</body>
</html>
