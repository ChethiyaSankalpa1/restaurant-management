<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>User Management — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert-custom alert-success mb-4">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert-custom alert-danger mb-4">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <!-- Header -->
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 style="margin:0;font-weight:800;color:#2d3748;">👥 User Management</h4>
                <p style="margin:0;color:#6c757d;font-size:13px;">Manage system users and access roles</p>
            </div>
            <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddModal()">
                <i class="fas fa-plus"></i> Add New User
            </button>
        </div>

        <!-- Stat Cards -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-card purple">
                    <div class="stat-card-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" th:text="${totalUsers}">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card green">
                    <div class="stat-card-icon"><i class="fas fa-user-check"></i></div>
                    <div class="stat-value" th:text="${activeUsers}">0</div>
                    <div class="stat-label">Active</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card cyan">
                    <div class="stat-card-icon"><i class="fas fa-user-shield"></i></div>
                    <div class="stat-value" th:text="${managerCount}">0</div>
                    <div class="stat-label">Managers</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card yellow">
                    <div class="stat-card-icon"><i class="fas fa-user-tie"></i></div>
                    <div class="stat-value" th:text="${staffCount}">0</div>
                    <div class="stat-label">Staff</div>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-users me-2" style="color:#6f42c1;"></i>System Users</h5>
            </div>
            <div style="overflow-x:auto;">
                <table class="table-custom" style="width:100%;">
                    <thead>
                        <tr>
                            <th>NAME</th><th>EMAIL</th><th>ROLE</th><th>BRANCH</th><th>STATUS</th><th>CREATED</th><th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6f42c1,#4a235a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;"
                                         th:text="${#strings.substring(user.name ?: 'U', 0, 1).toUpperCase()}">U</div>
                                    <div>
                                        <div style="font-weight:700;font-size:13.5px;" th:text="${user.name}">Name</div>
                                    </div>
                                </div>
                            </td>
                            <td style="font-size:13px;" th:text="${user.email}">email</td>
                            <td>
                                <span class="badge-status"
                                      th:text="${user.role}"
                                      th:classappend="${user.role == 'ADMIN'} ? ' badge-completed' : (${user.role == 'MANAGER'} ? ' badge-preparing' : ' badge-pending')">ROLE</span>
                            </td>
                            <td style="font-size:13px;" th:text="${user.branch} ?: '-'">Branch</td>
                            <td>
                                <span class="badge-status"
                                      th:text="${user.status}"
                                      th:classappend="${user.status == 'active'} ? ' badge-completed' : ' badge-cancelled'">Status</span>
                            </td>
                            <td style="font-size:12px;color:#6c757d;" th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt,'dd MMM yyyy')} : '-'">-</td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <button class="btn-sm-action btn-sm-edit" title="Edit"
                                            th:data-id="${user.id}"
                                            th:data-name="${user.name}"
                                            th:data-email="${user.email}"
                                            th:data-role="${user.role}"
                                            th:data-branch="${user.branch}"
                                            th:data-status="${user.status}"
                                            onclick="openEditModal(this)">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <form th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post" style="display:inline;">
                                        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action"
                                                th:classappend="${user.status == 'active'} ? ' btn-sm-delete' : ' btn-sm-view'"
                                                th:title="${user.status == 'active'} ? 'Deactivate' : 'Activate'">
                                            <i class="fas" th:classappend="${user.status == 'active'} ? ' fa-ban' : ' fa-check'"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display:inline;"
                                          onsubmit="return confirm('Delete this user?')">
                                        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action btn-sm-delete" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${users == null or #lists.isEmpty(users)}">
                            <td colspan="7" style="text-align:center;padding:40px;color:#6c757d;">
                                <i class="fas fa-users fa-3x mb-3" style="opacity:.3;display:block;"></i>
                                No users found.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:16px;border:none;">
            <div class="modal-header" style="background:linear-gradient(135deg,#6f42c1,#4a235a);color:#fff;border-radius:16px 16px 0 0;padding:20px 24px;">
                <h5 class="modal-title" id="modalTitle" style="font-weight:700;"><i class="fas fa-user-plus me-2"></i>Add New User</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="userForm" th:action="@{/admin/users/save}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                <input type="hidden" id="userId" name="id"/>
                <div class="modal-body" style="padding:24px;">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">Full Name *</label>
                            <input type="text" class="form-control-custom" id="userName" name="name" required placeholder="John Doe"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Email Address *</label>
                            <input type="email" class="form-control-custom" id="userEmail" name="email" required placeholder="john@restaurant.com"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Password <span id="pwdNote" style="color:#6c757d;font-size:11px;">(required for new users)</span></label>
                            <input type="password" class="form-control-custom" id="userPassword" name="password" placeholder="Leave blank to keep current"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Role *</label>
                            <select class="form-control-custom" id="userRole" name="role" required>
                                <option value="ADMIN">Admin</option>
                                <option value="MANAGER">Manager</option>
                                <option value="STAFF">Staff</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Branch</label>
                            <input type="text" class="form-control-custom" id="userBranch" name="branch" value="Main Branch"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Status</label>
                            <select class="form-control-custom" id="userStatus" name="status">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="padding:16px 24px;border-top:1px solid #e2e8f0;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save User</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
function openAddModal() {
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus me-2"></i>Add New User';
    document.getElementById('userForm').reset();
    document.getElementById('userId').value = '';
    document.getElementById('pwdNote').textContent = '(required for new users)';
}

function openEditModal(btn) {
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit me-2"></i>Edit User';
    document.getElementById('userId').value = btn.dataset.id;
    document.getElementById('userName').value = btn.dataset.name || '';
    document.getElementById('userEmail').value = btn.dataset.email || '';
    document.getElementById('userRole').value = btn.dataset.role || 'STAFF';
    document.getElementById('userBranch').value = btn.dataset.branch || 'Main Branch';
    document.getElementById('userStatus').value = btn.dataset.status || 'active';
    document.getElementById('userPassword').value = '';
    document.getElementById('pwdNote').textContent = '(leave blank to keep current)';
    new bootstrap.Modal(document.getElementById('userModal')).show();
}
</script>
</body>
</html>
