<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>POS — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <!-- CSRF Token for AJAX -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="pos-wrapper">
        <!-- LEFT: Menu Panel -->
        <div class="pos-left">
            <!-- Order Type Tabs -->
            <div style="display:flex;gap:6px;margin-bottom:16px;background:#fff;padding:6px;border-radius:12px;border:1px solid #e2e8f0;" th:inline="none">
                <button class="order-type-tab active" id="tab-dinein" onclick="setOrderType('DineIn', this)">🍽️ Dine In</button>
                <button class="order-type-tab" id="tab-pickup" onclick="setOrderType('Takeaway', this)">📦 Pick Up</button>
                <button class="order-type-tab" id="tab-delivery" onclick="setOrderType('Delivery', this)">🛵 Delivery</button>
            </div>

            <!-- Search Bar -->
            <div class="search-box mb-3" th:inline="none">
                <i class="fas fa-search"></i>
                <input type="text" class="form-control-custom" id="menuSearch" placeholder="Search menu items..." oninput="searchMenuItems(this.value)"/>
            </div>

            <!-- Category Filter -->
            <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:thin;" th:inline="none">
                <button class="category-filter-btn active" onclick="filterCategory('', this)">All</button>
                <button th:each="cat : ${categories}" th:if="${cat != null}" class="category-filter-btn cat-btn"
                        th:data-id="${cat?.id}" th:data-category="${cat?.id}">
                    <span th:text="${cat?.name ?: 'Category'}">Category</span>
                </button>
            </div>

            <!-- Menu Items Grid -->
            <div class="row g-2" id="menuGrid">
                <div th:each="item : ${menuItems}" th:if="${item != null}" class="col-6 col-md-4 col-xl-3 menu-item-container"
                     th:data-category="${item?.categoryId ?: ''}">
                        <div class="menu-item-card item-card" 
                             th:data-id="${item?.id}"
                             th:data-name="${item?.name ?: ''}"
                             th:data-price="${item?.price ?: 0.0}"
                             th:data-img="${item?.imageUrl ?: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200'}">
                        <img th:src="${item?.imageUrl ?: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200'}" 
                             th:alt="${item?.name ?: 'Item'}"
                             class="menu-item-img"/>
                        <div class="item-info">
                            <div class="item-name" th:text="${item?.name ?: 'Unnamed'}">Item Name</div>
                            <div class="item-price" th:text="${item?.price != null} ? |${currencySymbol}${#numbers.formatDecimal(item.price, 1, 2)}| : |${currencySymbol}0.00|">0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Cart Panel -->
        <div class="pos-right">
            <div class="pos-right-header">
                <h6 style="font-weight:700;margin:0;color:#2d3748;">🛒 Current Order</h6>
                <input type="hidden" id="orderType" value="DineIn"/>
            </div>

            <div class="pos-right-body">
                <!-- Customer Selector -->
                <div class="mb-3">
                    <label class="form-label-custom">Customer</label>
                    <select class="form-control-custom" id="customerId">
                        <option value="">Walk-in Customer</option>
                        <option th:each="c : ${customers}" th:if="${c != null}" th:value="${c?.id}" 
                                th:text="${c?.name != null and c?.phone != null} ? |${c.name} (${c.phone})| : (${c?.name} ?: 'Customer')">Customer</option>
                    </select>
                </div>

                <!-- Table Selector (Dine-In only) -->
                <div class="mb-3" id="tableSection">
                    <label class="form-label-custom">Table</label>
                    <select class="form-control-custom" id="tableId">
                        <option value="">Select Table</option>
                        <option th:each="t : ${tables}" th:if="${t != null}" th:value="${t?.id}"
                                th:text="${t?.tableNumber != null} ? |Table ${t.tableNumber} (${t?.capacity ?: 0} seats)| : 'Table'">Table</option>
                    </select>
                </div>

                <!-- Waiter Selector -->
                <div class="mb-3">
                    <label class="form-label-custom">Waiter</label>
                    <select class="form-control-custom" id="waiterId">
                        <option value="">Select Waiter</option>
                        <option th:each="s : ${waiters}" th:if="${s != null}" th:value="${s?.id}" th:text="${s?.name ?: 'Waiter'}">Waiter</option>
                    </select>
                </div>
                
                <!-- Rider Selector (Delivery only) -->
                <div class="mb-3" id="riderSection" style="display:none;">
                    <label class="form-label-custom">Rider</label>
                    <select class="form-control-custom" id="riderId">
                        <option value="">Select Rider</option>
                        <option th:each="r : ${riders}" th:if="${r != null}" th:value="${r?.id}" th:text="${r?.name ?: 'Rider'}">Rider</option>
                    </select>
                </div>

                <hr style="border-color:#e2e8f0;"/>

                <!-- Cart Items -->
                <div id="cartItems">
                    <div style="text-align:center;padding:30px 20px;color:#6c757d;" id="emptyCart">
                        <i class="fas fa-shopping-cart fa-2x mb-2" style="opacity:.3;display:block;"></i>
                        <span style="font-size:13px;">Add items from the menu</span>
                    </div>
                </div>

                <!-- Notes -->
                <div class="mt-3">
                    <label class="form-label-custom">Order Notes</label>
                    <textarea class="form-control-custom" id="orderNotes" rows="2" placeholder="Special instructions..."></textarea>
                </div>
            </div>

            <!-- Order Total & Payment -->
            <div class="pos-right-footer">
                <div style="background:#f8f9ff;border-radius:10px;padding:12px;margin-bottom:12px;">
                    <div class="d-flex justify-content-between mb-1">
                        <span style="font-size:13px;color:#6c757d;">Subtotal</span>
                        <span style="font-size:13px;font-weight:600;"><span th:text="${currencySymbol}"></span><span id="subtotal">0.00</span></span>
                    </div>
                    <div class="d-flex justify-content-between mb-1">
                        <span style="font-size:13px;color:#6c757d;">Tax (10%)</span>
                        <span style="font-size:13px;font-weight:600;"><span th:text="${currencySymbol}"></span><span id="taxAmount">0.00</span></span>
                    </div>
                    <div id="loyaltyRow" class="d-flex justify-content-between mb-1" style="display:none!important;">
                        <span style="font-size:13px;color:#28a745;">Loyalty Discount</span>
                        <span style="font-size:13px;font-weight:600;color:#28a745;">-<span th:text="${currencySymbol}"></span><span id="loyaltyDiscount">0.00</span></span>
                    </div>
                    <hr style="margin:8px 0;border-color:#e2e8f0;"/>
                    <div class="d-flex justify-content-between">
                        <span style="font-size:15px;font-weight:800;">Total</span>
                        <span style="font-size:18px;font-weight:800;color:#6f42c1;"><span th:text="${currencySymbol}"></span><span id="totalAmount">0.00</span></span>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn-primary-custom justify-content-center" data-bs-toggle="modal" data-bs-target="#paymentModal">
                        <i class="fas fa-credit-card"></i> Pay & Submit Order
                    </button>
                    <button class="btn-sm-action" style="width:100%;border-radius:10px;background:#f3f4f6;color:#6c757d;border:1.5px solid #e2e8f0;font-size:13px;padding:8px;"
                            onclick="clearCart()">
                        <i class="fas fa-trash-alt me-1"></i> Clear Cart
                    </button>
                </div>
            </div>
        </div>
    </div>
</div><!-- /main-content -->

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:16px;border:none;">
            <div class="modal-header" style="border-bottom:1px solid #e2e8f0;padding:20px 24px;">
                <h5 class="modal-title" style="font-weight:800;">💳 Process Payment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding:24px;">
                <div style="text-align:center;margin-bottom:20px;">
                    <div style="font-size:36px;font-weight:900;color:#6f42c1;"><span th:text="${currencySymbol}"></span><span id="modal-total">0.00</span></div>
                    <div style="font-size:13px;color:#6c757d;">Total Amount Due</div>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">Payment Method</label>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                        <button class="pay-method-btn active" onclick="selectPayMethod('Cash', this)"
                            style="padding:14px 8px;border-radius:10px;border:2px solid #6f42c1;background:#f3e8ff;color:#6f42c1;font-weight:700;cursor:pointer;font-size:13px;">
                            💵 Cash
                        </button>
                        <button class="pay-method-btn" onclick="selectPayMethod('Card', this)"
                            style="padding:14px 8px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:#6c757d;font-weight:700;cursor:pointer;font-size:13px;">
                            💳 Card
                        </button>
                        <button class="pay-method-btn" onclick="selectPayMethod('BankTransfer', this)"
                            style="padding:14px 8px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:#6c757d;font-weight:700;cursor:pointer;font-size:13px;">
                            🏦 Bank
                        </button>
                    </div>
                </div>
                <div id="cashSection" class="mb-3">
                    <label class="form-label-custom">Amount Tendered</label>
                    <input type="number" class="form-control-custom" id="cashTendered" placeholder="0.00" oninput="calcChange()"/>
                    <div style="margin-top:8px;padding:10px;background:#d4edda;border-radius:8px;display:none;" id="changeRow">
                        <span style="font-size:13px;font-weight:700;color:#155724;">Change: <span th:text="${currencySymbol}"></span><span id="changeAmount">0.00</span></span>
                    </div>
                </div>
                <input type="hidden" id="paymentMethod" value="Cash"/>
            </div>
            <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:16px 24px;">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary-custom" id="confirmOrderBtn">
                    <i class="fas fa-check"></i> Confirm &amp; Submit
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
let cart = [];
let currentOrderId = '';
let orderType = 'DineIn';
let selectedCustomerId = '';
let selectedCustomerName = 'Walk-in';
let paymentMethod = 'Cash';
const TAX_RATE = 0.10;

$(function() {
    const token = $("meta[name='_csrf']").attr("content");
    const header = $("meta[name='_csrf_header']").attr("content");
    $.ajaxSetup({
        headers: { [header]: token }
    });
});

$(document).on('click', '#confirmOrderBtn', function() {
    submitOrder();
});

$(document).on('click', '.cat-btn', function() {
    filterCategoryFromElement(this);
});
$(document).on('click', '.item-card', function() {
    addToCartFromElement(this);
});
$(document).on('change', '#customerId', function() {
    updateCustomer(this);
});
$(document).on('error', '.menu-item-img', function() {
    this.src = 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200';
});

function setOrderType(type, btn) {
    orderType = type;
    document.querySelectorAll('.order-type-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tableSection').style.display = type === 'DineIn' ? 'block' : 'none';
    document.getElementById('riderSection').style.display = type === 'Delivery' ? 'block' : 'none';
    document.getElementById('orderType').value = type;
}

function addToCart(id, name, price, img) {
    const existing = cart.find(i => i.menuItemId === id);
    if (existing) { existing.quantity++; existing.subtotal = existing.quantity * existing.price; }
    else { cart.push({ menuItemId: id, name, price, quantity: 1, subtotal: price, status: 'Pending' }); }
    renderCart();
}

function removeFromCart(idx) {
    cart.splice(idx, 1);
    renderCart();
}

function updateQty(idx, delta) {
    cart[idx].quantity = Math.max(1, cart[idx].quantity + delta);
    cart[idx].subtotal = cart[idx].quantity * cart[idx].price;
    renderCart();
}

function renderCart() {
    const container = document.getElementById('cartItems');
    const emptyMsg = document.getElementById('emptyCart');
    if (cart.length === 0) {
        container.innerHTML = '';
        container.appendChild(emptyMsg);
        emptyMsg.style.display = 'block';
        updateTotals(0);
        return;
    }
    if (emptyMsg) emptyMsg.style.display = 'none';
    let html = '';
    let subtotal = 0;
    cart.forEach((item, idx) => {
        subtotal += item.subtotal;
        html += '<div class="cart-item">' +
            '<div style="flex:1;min-width:0;">' +
                '<div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + item.name + '</div>' +
                '<div style="font-size:12px;color:#6f42c1;font-weight:700;">[[${currencySymbol}]]' + item.price.toFixed(2) + '</div>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:6px;">' +
                '<button class="qty-btn" onclick="updateQty(' + idx + ', -1)">−</button>' +
                '<span style="font-size:14px;font-weight:700;min-width:20px;text-align:center;">' + item.quantity + '</span>' +
                '<button class="qty-btn" onclick="updateQty(' + idx + ', 1)">+</button>' +
                '<button class="btn-sm-action btn-sm-delete" onclick="removeFromCart(' + idx + ')"><i class="fas fa-times"></i></button>' +
            '</div>' +
        '</div>';
    });
    container.innerHTML = html;
    updateTotals(subtotal);
}

function updateTotals(subtotal) {
    const tax = subtotal * TAX_RATE;
    const total = subtotal + tax;
    document.getElementById('subtotal').textContent = subtotal.toFixed(2);
    document.getElementById('taxAmount').textContent = tax.toFixed(2);
    document.getElementById('totalAmount').textContent = total.toFixed(2);
    document.getElementById('modal-total').textContent = total.toFixed(2);
}

function clearCart() { cart = []; renderCart(); }

function updateCustomer(sel) {
    selectedCustomerId = sel.value;
    selectedCustomerName = sel.options[sel.selectedIndex].text.split(' (')[0];
}

function selectPayMethod(method, btn) {
    paymentMethod = method;
    document.getElementById('paymentMethod').value = method;
    document.querySelectorAll('.pay-method-btn').forEach(b => {
        b.style.borderColor = '#e2e8f0'; b.style.background = '#fff'; b.style.color = '#6c757d';
    });
    btn.style.borderColor = '#6f42c1'; btn.style.background = '#f3e8ff'; btn.style.color = '#6f42c1';
    document.getElementById('cashSection').style.display = method === 'Cash' ? 'block' : 'none';
}

function calcChange() {
    const tendered = parseFloat(document.getElementById('cashTendered').value) || 0;
    const total = parseFloat(document.getElementById('modal-total').textContent) || 0;
    const change = tendered - total;
    const row = document.getElementById('changeRow');
    if (tendered > 0) {
        row.style.display = 'block';
        document.getElementById('changeAmount').textContent = Math.max(0, change).toFixed(2);
        row.style.background = change >= 0 ? '#d4edda' : '#f8d7da';
    } else { row.style.display = 'none'; }
}

function addToCartFromElement(el) {
    const id = el.dataset.id;
    const name = el.dataset.name;
    const price = parseFloat(el.dataset.price);
    const img = el.dataset.img;
    addToCart(id, name, price, img);
}

function filterCategoryFromElement(el) {
    filterCategory(el.dataset.id, el);
}
function filterCategory(catId, btn) {
    document.querySelectorAll('.category-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.menu-item-container').forEach(card => {
        card.style.display = (!catId || card.dataset.category === catId) ? '' : 'none';
    });
}

function searchMenuItems(q) {
    const lower = q.toLowerCase();
    document.querySelectorAll('.menu-item-container').forEach(card => {
        const name = card.querySelector('.item-name').textContent.toLowerCase();
        card.style.display = name.includes(lower) ? '' : 'none';
    });
}

function submitOrder() {
    if (cart.length === 0) { alert('Please add items to the cart first!'); return; }
    const subtotal = cart.reduce((s, i) => s + i.subtotal, 0);
    const tax = subtotal * TAX_RATE;
    const selectedTable = document.getElementById('tableId');
    const selectedWaiter = document.getElementById('waiterId');
    const selectedRider = document.getElementById('riderId');
    const orderData = {
        customerName: selectedCustomerName,
        customerId: selectedCustomerId || null,
        type: orderType,
        source: 'Physical',
        items: cart,
        taxAmount: parseFloat(tax.toFixed(2)),
        totalAmount: parseFloat((subtotal + tax).toFixed(2)),
        paymentMethod: paymentMethod,
        paymentStatus: 'Paid',
        tableId: selectedTable.value || null,
        tableNumber: selectedTable.options[selectedTable.selectedIndex]?.text?.split(' ')[1] || null,
        waiterId: selectedWaiter.value || null,
        waiterName: selectedWaiter.options[selectedWaiter.selectedIndex]?.text || null,
        riderId: selectedRider.value || null,
        riderName: selectedRider.options[selectedRider.selectedIndex]?.text || null,
        notes: document.getElementById('orderNotes').value,
        branch: 'Main Branch'
    };

    $.ajax({
        url: '/pos/order', type: 'POST', contentType: 'application/json',
        data: JSON.stringify(orderData),
        success: (data) => {
            if (data.success) {
                // If table is selected, update its status to Occupied
                if (orderData.tableId) {
                    $.post('/tables/' + orderData.tableId + '/status', { status: 'Occupied' });
                }
                
                bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                clearCart();
                alert('✅ Order ' + data.orderNumber + ' submitted successfully!');
                location.reload();
            } else { alert('Error: ' + data.message); }
        },
        error: () => alert('Failed to submit order. Please try again.')
    });
}
</script>
</body>
</html>
