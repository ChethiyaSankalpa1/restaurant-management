<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Branches — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h4 style="font-weight:800;margin:0;">🏢 Branch Management</h4>
            <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addBranchModal">
                <i class="fas fa-plus"></i> Add Branch
            </button>
        </div>

        <div class="row g-3">
            <div th:each="branch : ${branches}" class="col-md-6 col-xl-4">
                <div class="content-card" style="border-top:4px solid #6f42c1;">
                    <div class="card-body-custom">
                        <div class="d-flex align-items-start justify-content-between mb-3">
                            <div>
                                <h5 style="font-weight:800;margin-bottom:4px;" th:text="${branch.name}">Branch Name</h5>
                                <span class="badge-status" th:text="${branch.status}" th:classappend="${branch.status == 'active'} ? ' badge-active' : ' badge-inactive'">active</span>
                            </div>
                            <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#6f42c1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:20px;">🏢</div>
                        </div>
                        <div style="font-size:13px;color:#6c757d;margin-bottom:8px;"><i class="fas fa-map-marker-alt me-2" style="color:#6f42c1;"></i><span th:text="${branch.address} ?: '—'">Address</span></div>
                        <div style="font-size:13px;color:#6c757d;margin-bottom:8px;"><i class="fas fa-phone me-2" style="color:#6f42c1;"></i><span th:text="${branch.phone} ?: '—'">Phone</span></div>
                        <div style="font-size:13px;color:#6c757d;margin-bottom:12px;"><i class="fas fa-user-tie me-2" style="color:#6f42c1;"></i><span th:text="${branch.managerName} ?: '—'">Manager</span></div>
                        <div class="d-flex gap-2 justify-content-end">
                            <form th:action="@{/branches/delete/{id}(id=${branch.id})}" method="post" style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn-sm-action btn-sm-delete" onclick="return confirm('Delete?')"><i class="fas fa-trash-alt"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(branches)}" class="col-12" style="text-align:center;padding:40px;color:#6c757d;">No branches found.</div>
        </div>
    </div>
</div>

<!-- Add Branch Modal -->
<div class="modal fade" id="addBranchModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;"><h5 style="font-weight:700;margin:0;">Add Branch</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/branches/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body" style="padding:20px;">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label-custom">Branch Name *</label>
                            <input type="text" name="name" class="form-control-custom" required/></div>
                        <div class="col-12"><label class="form-label-custom">Address</label>
                            <input type="text" name="address" class="form-control-custom"/></div>
                        <div class="col-6"><label class="form-label-custom">Phone</label>
                            <input type="text" name="phone" class="form-control-custom"/></div>
                        <div class="col-6"><label class="form-label-custom">Email</label>
                            <input type="email" name="email" class="form-control-custom"/></div>
                        <div class="col-12"><label class="form-label-custom">Manager Name</label>
                            <input type="text" name="managerName" class="form-control-custom"/></div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:12px 20px;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save Branch</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
