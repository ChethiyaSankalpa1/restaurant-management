<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Payroll — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-xl-3">
                <div class="stat-card purple"><div class="stat-card-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                    <div class="stat-value" th:text="${totalPayrolls}">0</div><div class="stat-label">Total Payrolls</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card green"><div class="stat-card-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-value" th:text="${paidCount}">0</div><div class="stat-label">Paid</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card yellow"><div class="stat-card-icon"><i class="fas fa-hourglass-half"></i></div>
                    <div class="stat-value" th:text="${pendingCount}">0</div><div class="stat-label">Pending</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card cyan"><div class="stat-card-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-value"><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(totalAmount,1,2)}">0</span></div>
                    <div class="stat-label">Total Net Pay</div></div>
            </div>
        </div>

        <!-- Generate Payroll -->
        <div class="content-card mb-4">
            <div class="card-header-custom">
                <h5><i class="fas fa-cog me-2" style="color:#6f42c1;"></i>Generate Monthly Payroll</h5>
            </div>
            <div class="card-body-custom">
                <form th:action="@{/staff/payroll/generate}" method="post" class="row g-3 align-items-end">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="col-md-4">
                        <label class="form-label-custom">Month</label>
                        <select name="month" class="form-control-custom">
                            <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                            <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                            <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                            <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">Year</label>
                        <input type="number" name="year" class="form-control-custom" th:value="${currentYear}"/>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn-primary-custom w-100 justify-content-center">
                            <i class="fas fa-play"></i> Generate Payroll
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Payroll Table -->
        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-list me-2" style="color:#6f42c1;"></i>Payroll Records</h5>
            </div>
            <div style="overflow-x:auto;">
                <table class="table-custom">
                    <thead>
                        <tr><th>EMPLOYEE</th><th>PERIOD</th><th>BASIC</th><th>ALLOWANCES</th><th>DEDUCTIONS</th><th>GROSS</th><th>NET PAY</th><th>ATTENDANCE</th><th>STATUS</th><th>ACTIONS</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${payrolls}">
                            <td>
                                <div style="font-weight:700;" th:text="${p.employeeName}">Name</div>
                                <div style="font-size:11px;color:#6c757d;" th:text="${p.employeePosition} ?: ''">Position</div>
                            </td>
                            <td style="font-size:12px;" th:text="${p.month} + '/' + ${p.year}">01/2026</td>
                            <td><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(p.basicSalary ?: 0,1,2)}">0</span></td>
                            <td class="text-money">+<span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(p.allowances ?: 0,1,2)}">0</span></td>
                            <td style="color:#dc3545;">-<span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(p.deductions ?: 0,1,2)}">0</span></td>
                            <td><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(p.grossSalary ?: 0,1,2)}">0</span></td>
                            <td><strong class="text-money"><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(p.netPay ?: 0,1,2)}">0</span></strong></td>
                            <td style="font-size:12px;">
                                <span th:text="${p.presentDays} + '/' + ${p.workingDays} + ' days'">0/26</span>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:text="${p.status}"
                                      th:classappend="|${p.status == 'Paid'} ? ' badge-paid' : (${p.status == 'Approved'} ? ' badge-approved' : ' badge-pending')|">Pending</span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <form th:if="${p.status == 'Pending'}" th:action="@{/staff/payroll/{id}/approve(id=${p.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action btn-sm-success" title="Approve">✓</button>
                                    </form>
                                    <form th:if="${p.status == 'Approved'}" th:action="@{/staff/payroll/{id}/paid(id=${p.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action btn-sm-success" title="Mark as Paid">💰</button>
                                    </form>
                                    <form th:action="@{/staff/payroll/{id}/delete(id=${p.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action btn-sm-delete" onclick="return confirm('Delete?')"><i class="fas fa-trash-alt"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(payrolls)}">
                            <td colspan="10" style="text-align:center;padding:30px;color:#6c757d;">No payroll records. Generate payroll first.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
