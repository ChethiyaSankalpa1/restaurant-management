<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Riders — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h4 style="font-weight:800;margin:0;">🛵 Rider Management</h4>
            <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addRiderModal">
                <i class="fas fa-plus"></i> Add Rider
            </button>
        </div>

        <div class="row g-3">
            <div th:each="rider : ${riders}" class="col-md-6 col-xl-4">
                <div class="content-card">
                    <div class="card-body-custom">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#17a2b8,#00bcd4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;">🛵</div>
                            <div>
                                <h6 style="font-weight:800;margin-bottom:3px;" th:text="${rider.name}">Rider</h6>
                                <div style="font-size:12px;color:#6c757d;" th:text="${rider.phone} ?: '—'">Phone</div>
                            </div>
                            <span class="badge-status ms-auto" th:text="${rider.status}" th:classappend="${rider.status == 'active'} ? ' badge-active' : ' badge-inactive'">active</span>
                        </div>
                        <div class="row g-2 mb-3" style="font-size:12px;color:#6c757d;">
                            <div class="col-6"><i class="fas fa-car me-1"></i><span th:text="${rider.vehicleType} ?: '—'">Bike</span></div>
                            <div class="col-6"><i class="fas fa-id-card me-1"></i><span th:text="${rider.licenseNumber} ?: '—'">—</span></div>
                        </div>
                        <form th:action="@{/riders/delete/{id}(id=${rider.id})}" method="post" style="text-align:right;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-sm-action btn-sm-delete" onclick="return confirm('Delete?')"><i class="fas fa-trash-alt"></i></button>
                        </form>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(riders)}" class="col-12" style="text-align:center;padding:40px;color:#6c757d;">
                <i class="fas fa-motorcycle fa-3x mb-3" style="opacity:.3;display:block;"></i>
                No riders added yet.
            </div>
        </div>
    </div>
</div>

<!-- Add Rider Modal -->
<div class="modal fade" id="addRiderModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;"><h5 style="font-weight:700;margin:0;">Add Rider</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/riders/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body" style="padding:20px;">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label-custom">Full Name *</label>
                            <input type="text" name="name" class="form-control-custom" required/></div>
                        <div class="col-6"><label class="form-label-custom">Phone</label>
                            <input type="text" name="phone" class="form-control-custom"/></div>
                        <div class="col-6"><label class="form-label-custom">Email</label>
                            <input type="email" name="email" class="form-control-custom"/></div>
                        <div class="col-6">
                            <label class="form-label-custom">Vehicle Type</label>
                            <select name="vehicleType" class="form-control-custom">
                                <option>Motorcycle</option><option>Bicycle</option><option>Car</option><option>Scooter</option>
                            </select>
                        </div>
                        <div class="col-6"><label class="form-label-custom">License No.</label>
                            <input type="text" name="licenseNumber" class="form-control-custom"/></div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:12px 20px;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save Rider</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
