<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Expenses — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-xl-3">
                <div class="stat-card purple"><div class="stat-card-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                    <div class="stat-value" th:text="${totalCount}">0</div><div class="stat-label">Total Expenses</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card yellow"><div class="stat-card-icon"><i class="fas fa-hourglass-half"></i></div>
                    <div class="stat-value" th:text="${pendingCount}">0</div><div class="stat-label">Pending</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card green"><div class="stat-card-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-value" th:text="${approvedCount}">0</div><div class="stat-label">Approved</div></div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="stat-card cyan"><div class="stat-card-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-value"><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(totalAmount,1,2)}">0</span></div>
                    <div class="stat-label">Total Amount</div></div>
            </div>
        </div>

        <div class="d-flex justify-content-between mb-3 align-items-center flex-wrap gap-2">
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/expenses}" th:classappend="${filterStatus == null} ? ' active' : ''" class="period-btn">All</a>
                <a th:href="@{/expenses(status='Pending')}" th:classappend="${filterStatus == 'Pending'} ? ' active' : ''" class="period-btn">Pending</a>
                <a th:href="@{/expenses(status='Approved')}" th:classappend="${filterStatus == 'Approved'} ? ' active' : ''" class="period-btn">Approved</a>
            </div>
            <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                <i class="fas fa-plus"></i> Add Expense
            </button>
        </div>

        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-receipt me-2" style="color:#6f42c1;"></i>Expense Records</h5>
            </div>
            <div style="overflow-x:auto;">
                <table class="table-custom">
                    <thead>
                        <tr><th>EXP #</th><th>CATEGORY</th><th>VENDOR</th><th>AMOUNT</th><th>DATE</th><th>BRANCH</th><th>STATUS</th><th>APPROVED BY</th><th>ACTIONS</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${expenses}">
                            <td><strong style="color:#6f42c1;" th:text="${e.expenseNumber}">EXP-001</strong></td>
                            <td th:text="${e.category}">Category</td>
                            <td th:text="${e.vendor} ?: '—'">Vendor</td>
                            <td class="text-money"><span th:text="${currencySymbol}"></span><span th:text="${#numbers.formatDecimal(e.amount ?: 0,1,2)}">0</span></td>
                            <td th:text="${e.date}">-</td>
                            <td th:text="${e.branch} ?: '—'">Branch</td>
                            <td>
                                <span class="badge-status"
                                      th:text="${e.status}"
                                      th:classappend="${e.status == 'Approved'} ? ' badge-approved' : ' badge-pending'">Pending</span>
                            </td>
                            <td style="font-size:12px;color:#6c757d;" th:text="${e.approvedBy} ?: '—'">-</td>
                            <td>
                                <div class="d-flex gap-1">
                                    <form th:if="${e.status != 'Approved'}" th:action="@{/expenses/{id}/approve(id=${e.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action btn-sm-success" title="Approve" onclick="return confirm('Approve this expense?')">✓</button>
                                    </form>
                                    <form th:action="@{/expenses/delete/{id}(id=${e.id})}" method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn-sm-action btn-sm-delete" onclick="return confirm('Delete?')"><i class="fas fa-trash-alt"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(expenses)}">
                            <td colspan="9" style="text-align:center;padding:30px;color:#6c757d;">No expense records found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Expense Modal -->
<div class="modal fade" id="addExpenseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;"><h5 style="font-weight:700;margin:0;">Record Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/expenses/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body" style="padding:20px;">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">Category *</label>
                            <select name="category" class="form-control-custom" required>
                                <option>Rent</option><option>Utilities</option><option>Salary</option>
                                <option>Maintenance</option><option>Marketing</option><option>Supplies</option>
                                <option>Equipment</option><option>Insurance</option><option>Other</option>
                            </select>
                        </div>
                        <div class="col-md-6"><label class="form-label-custom">Vendor</label>
                            <input type="text" name="vendor" class="form-control-custom"/></div>
                        <div class="col-md-6"><label class="form-label-custom">Amount *</label>
                            <input type="number" name="amount" class="form-control-custom" step="0.01" min="0" required/></div>
                        <div class="col-md-6"><label class="form-label-custom">Date *</label>
                            <input type="date" name="date" class="form-control-custom" required/></div>
                        <div class="col-md-6"><label class="form-label-custom">Payment Method</label>
                            <select name="paymentMethod" class="form-control-custom">
                                <option>Cash</option><option>Card</option><option>Bank Transfer</option>
                            </select>
                        </div>
                        <div class="col-md-6"><label class="form-label-custom">Branch</label>
                            <input type="text" name="branch" class="form-control-custom" value="Main Branch"/></div>
                        <div class="col-12"><label class="form-label-custom">Notes</label>
                            <textarea name="notes" class="form-control-custom" rows="2"></textarea></div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:12px 20px;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save Expense</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
