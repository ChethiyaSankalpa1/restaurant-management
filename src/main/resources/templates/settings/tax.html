<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Tax Management — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h4 style="font-weight:800;margin:0;">💹 Tax Management</h4>
            <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addTaxModal">
                <i class="fas fa-plus"></i> Add Tax
            </button>
        </div>

        <div class="content-card">
            <div class="card-header-custom"><h5><i class="fas fa-percent me-2" style="color:#6f42c1;"></i>Tax Rates</h5></div>
            <div style="overflow-x:auto;">
                <table class="table-custom">
                    <thead><tr><th>NAME</th><th>RATE</th><th>TYPE</th><th>APPLIES TO</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
                    <tbody>
                        <tr th:each="tax : ${taxes}">
                            <td><strong th:text="${tax.name}">VAT</strong></td>
                            <td><span style="font-size:16px;font-weight:800;color:#6f42c1;" th:text="${tax.rate}">0</span>%</td>
                            <td th:text="${tax.type}">VAT</td>
                            <td th:text="${tax.appliesTo}">all</td>
                            <td><span class="badge-status" th:text="${tax.status}" th:classappend="${tax.status == 'active'} ? ' badge-active' : ' badge-inactive'">active</span></td>
                            <td>
                                <form th:action="@{/settings/tax/delete/{id}(id=${tax.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-sm-action btn-sm-delete" onclick="return confirm('Delete?')"><i class="fas fa-trash-alt"></i></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(taxes)}">
                            <td colspan="6" style="text-align:center;padding:30px;color:#6c757d;">No taxes configured.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Tax Modal -->
<div class="modal fade" id="addTaxModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;"><h5 style="font-weight:700;margin:0;">Add Tax</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/settings/tax/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body" style="padding:20px;">
                    <div class="row g-3">
                        <div class="col-6"><label class="form-label-custom">Tax Name *</label>
                            <input type="text" name="name" class="form-control-custom" placeholder="VAT" required/></div>
                        <div class="col-6"><label class="form-label-custom">Rate (%) *</label>
                            <input type="number" name="rate" class="form-control-custom" step="0.01" min="0" max="100" required/></div>
                        <div class="col-6"><label class="form-label-custom">Type</label>
                            <select name="type" class="form-control-custom"><option>VAT</option><option>Service Tax</option><option>GST</option></select></div>
                        <div class="col-6"><label class="form-label-custom">Status</label>
                            <select name="status" class="form-control-custom"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:12px 20px;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save Tax</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
