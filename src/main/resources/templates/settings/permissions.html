<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Settings — Permissions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">
        <h4 style="font-weight:800;margin-bottom:24px;">🔐 Role Permissions</h4>
        <div class="content-card">
            <div class="card-body-custom">
                <table class="table-custom">
                    <thead><tr><th>MODULE</th><th>ADMIN</th><th>MANAGER</th><th>STAFF</th></tr></thead>
                    <tbody>
                        <tr th:each="row : ${ {'Dashboard','Orders','POS','Kitchen','Tables','Menu','Customers','Staff','Payroll','Inventory','Expenses','Accounts','Reports','Branches','Tax','Loyalty','Suppliers','Attendance','Riders'} }">
                            <td><strong th:text="${row}">Module</strong></td>
                            <td><span style="color:#28a745;font-size:16px;">✅</span></td>
                            <td><span style="color:#28a745;font-size:16px;"
                                      th:text="${row == 'Payroll' or row == 'Accounts' or row == 'Reports' or row == 'Branches' or row == 'Tax'} ? '✅' : '✅'">✅</span></td>
                            <td><span th:style="|${row == 'Payroll' or row == 'Accounts' or row == 'Branches' or row == 'Tax' or row == 'Reports'} ? 'color:#dc3545;font-size:16px;' : 'color:#28a745;font-size:16px;'|"
                                      th:text="${row == 'Payroll' or row == 'Accounts' or row == 'Branches' or row == 'Tax' or row == 'Reports'} ? '❌' : '✅'">✅</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
