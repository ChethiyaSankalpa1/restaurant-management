<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Settings — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">
        <div class="row g-3">
            <div class="col-md-6 col-xl-4">
                <a href="/branches" style="text-decoration:none;">
                    <div class="content-card" style="padding:24px;transition:all .3s;border-top:4px solid #6f42c1;"
                         onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                        <div style="font-size:32px;margin-bottom:12px;">🏢</div>
                        <h5 style="font-weight:700;margin-bottom:4px;color:#2d3748;">Branch Management</h5>
                        <p style="font-size:13px;color:#6c757d;margin:0;">Manage restaurant branches</p>
                    </div>
                </a>
            </div>
            <div class="col-md-6 col-xl-4">
                <a href="/settings/tax" style="text-decoration:none;">
                    <div class="content-card" style="padding:24px;transition:all .3s;border-top:4px solid #28a745;"
                         onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                        <div style="font-size:32px;margin-bottom:12px;">💹</div>
                        <h5 style="font-weight:700;margin-bottom:4px;color:#2d3748;">Tax Management</h5>
                        <p style="font-size:13px;color:#6c757d;margin:0;">Configure tax rates and rules</p>
                    </div>
                </a>
            </div>
            <div class="col-md-6 col-xl-4">
                <a href="/settings/permissions" style="text-decoration:none;">
                    <div class="content-card" style="padding:24px;transition:all .3s;border-top:4px solid #17a2b8;"
                         onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                        <div style="font-size:32px;margin-bottom:12px;">🔐</div>
                        <h5 style="font-weight:700;margin-bottom:4px;color:#2d3748;">Permissions</h5>
                        <p style="font-size:13px;color:#6c757d;margin:0;">Manage role-based access control</p>
                    </div>
                </a>
            </div>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert-custom alert-success mt-4">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <!-- Global Settings -->
        <div class="content-card mt-4">
            <div class="card-header-custom">
                <h5><i class="fas fa-globe me-2" style="color:#6f42c1;"></i>Global System Settings</h5>
            </div>
            <div class="card-body-custom">
                <form th:action="@{/settings/save}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight:600;font-size:13px;color:#4a5568;">Currency</label>
                            <select class="form-control-custom" name="currencyName" id="currencySelect" onchange="updateSymbol()">
                                <option value="LKR" th:selected="${currencyName == 'LKR'}">🇱🇰 LKR - Sri Lankan Rupee</option>
                                <option value="USD" th:selected="${currencyName == 'USD'}">🇺🇸 USD - US Dollar</option>
                                <option value="EUR" th:selected="${currencyName == 'EUR'}">🇪🇺 EUR - Euro</option>
                                <option value="GBP" th:selected="${currencyName == 'GBP'}">🇬🇧 GBP - British Pound</option>
                                <option value="INR" th:selected="${currencyName == 'INR'}">🇮🇳 INR - Indian Rupee</option>
                                <option value="AUD" th:selected="${currencyName == 'AUD'}">🇦🇺 AUD - Australian Dollar</option>
                                <option value="JPY" th:selected="${currencyName == 'JPY'}">🇯🇵 JPY - Japanese Yen</option>
                                <option value="CAD" th:selected="${currencyName == 'CAD'}">🇨🇦 CAD - Canadian Dollar</option>
                                <option value="SGD" th:selected="${currencyName == 'SGD'}">🇸🇬 SGD - Singapore Dollar</option>
                                <option value="AED" th:selected="${currencyName == 'AED'}">🇦🇪 AED - UAE Dirham</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight:600;font-size:13px;color:#4a5568;">Currency Symbol</label>
                            <select class="form-control-custom" name="currencySymbol" id="symbolSelect">
                                <option value="Rs." th:selected="${currencySymbol == 'Rs.'}">Rs. (Rupee)</option>
                                <option value="$" th:selected="${currencySymbol == '$'}">$ (Dollar)</option>
                                <option value="€" th:selected="${currencySymbol == '€'}">€ (Euro)</option>
                                <option value="£" th:selected="${currencySymbol == '£'}">£ (Pound)</option>
                                <option value="₹" th:selected="${currencySymbol == '₹'}">₹ (Indian Rupee)</option>
                                <option value="A$" th:selected="${currencySymbol == 'A$'}">A$ (AUD)</option>
                                <option value="¥" th:selected="${currencySymbol == '¥'}">¥ (Yen)</option>
                                <option value="C$" th:selected="${currencySymbol == 'C$'}">C$ (CAD)</option>
                                <option value="S$" th:selected="${currencySymbol == 'S$'}">S$ (SGD)</option>
                                <option value="د.إ" th:selected="${currencySymbol == 'د.إ'}">د.إ (Dirham)</option>
                            </select>
                        </div>
                        <div class="col-12 mt-3 text-end">
                            <button type="submit" class="btn-primary-custom" style="padding:10px 20px;">Save Settings</button>
                        </div>
                    </div>
                </form>
                <script>
                function updateSymbol() {
                    const map = {LKR:'Rs.',USD:'$',EUR:'€',GBP:'£',INR:'₹',AUD:'A$',JPY:'¥',CAD:'C$',SGD:'S$',AED:'د.إ'};
                    const sel = document.getElementById('currencySelect').value;
                    if (map[sel]) document.getElementById('symbolSelect').value = map[sel];
                }
                </script>
            </div>
        </div>

        <!-- System Info -->
        <div class="content-card mt-4">
            <div class="card-header-custom">
                <h5><i class="fas fa-info-circle me-2" style="color:#6f42c1;"></i>System Information</h5>
            </div>
            <div class="card-body-custom">
                <div class="row g-3">
                    <div class="col-md-3" style="text-align:center;padding:16px;background:#f3e8ff;border-radius:10px;">
                        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;">Version</div>
                        <div style="font-size:18px;font-weight:800;color:#6f42c1;">1.0.0</div>
                    </div>
                    <div class="col-md-3" style="text-align:center;padding:16px;background:#d4edda;border-radius:10px;">
                        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;">Framework</div>
                        <div style="font-size:18px;font-weight:800;color:#28a745;">Spring Boot 3</div>
                    </div>
                    <div class="col-md-3" style="text-align:center;padding:16px;background:#cce5ff;border-radius:10px;">
                        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;">Database</div>
                        <div style="font-size:18px;font-weight:800;color:#004085;">MongoDB Atlas</div>
                    </div>
                    <div class="col-md-3" style="text-align:center;padding:16px;background:#fff3cd;border-radius:10px;">
                        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6c757d;">Template</div>
                        <div style="font-size:18px;font-weight:800;color:#856404;">Thymeleaf</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
