<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Menu Management — RestaurantPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="page-content fade-in">

        <div th:if="${success}" class="alert-custom alert-success mb-3">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h4 style="font-weight:800;margin:0;">🍽️ Menu Management</h4>
                <p style="margin:0;color:#6c757d;font-size:13px;">Manage menu items and categories</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addItemModal">
                    <i class="fas fa-plus"></i> Add Menu Item
                </button>
                <button class="btn-primary-custom btn-info-custom" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
                    <i class="fas fa-tag"></i> Add Category
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="content-card mb-4">
            <div class="card-body-custom">
                <form th:action="@{/menu}" method="get" class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" name="search" class="form-control-custom" placeholder="Search items..." th:value="${search}"/>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select name="categoryId" class="form-control-custom">
                            <option value="">All Categories</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                    th:selected="${filterCategory == cat.id}">Category</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn-primary-custom w-100 justify-content-center">
                            <i class="fas fa-filter"></i> Filter
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Categories Section -->
        <div class="content-card mb-4">
            <div class="card-header-custom">
                <h5><i class="fas fa-th-large me-2" style="color:#6f42c1;"></i>Categories (<span th:text="${categories != null ? #lists.size(categories) : 0}">0</span>)</h5>
            </div>
            <div class="card-body-custom">
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <div th:each="cat : ${categories}"
                         style="background:#f3e8ff;border:1.5px solid #d8b4fe;border-radius:10px;padding:8px 16px;display:flex;align-items:center;gap:10px;">
                        <span style="font-size:13px;font-weight:700;color:#6f42c1;" th:text="${cat.name}">Category</span>
                        <form th:action="@{/menu/category/delete/{id}(id=${cat.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" style="background:none;border:none;color:#dc3545;cursor:pointer;font-size:11px;" onclick="return confirm('Delete category?')">
                                <i class="fas fa-times"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Menu Items Grid -->
        <div class="content-card">
            <div class="card-header-custom">
                <h5><i class="fas fa-list me-2" style="color:#6f42c1;"></i>Menu Items (<span th:text="${menuItems != null ? #lists.size(menuItems) : 0}">0</span>)</h5>
            </div>
            <div class="card-body-custom">
                <div class="row g-3">
                    <div th:each="item : ${menuItems}" th:if="${item != null}" class="col-md-6 col-xl-4 col-xxl-3">
                        <div class="menu-item-card">
                            <img th:src="${item.imageUrl ?: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=300'}" th:alt="${item.name ?: 'Item'}" class="menu-item-img"/>
                            <div class="item-info">
                                <div class="item-name" th:text="${item.name ?: 'Unnamed Item'}">Item</div>
                                <div class="item-desc" th:text="${item.description ?: ''}">Desc</div>
                                <div class="item-price" th:text="${item.price != null} ? |$${#numbers.formatDecimal(item.price, 1, 2)}| : '$0.00'">$0.00</div>
                                <div class="item-footer">
                                    <span class="badge-status" 
                                          th:text="${item.available != null and item.available} ? 'Available' : 'Unavailable'"
                                          th:classappend="${item.available != null and item.available} ? ' badge-active' : ' badge-inactive'">Available</span>
                                    <div class="d-flex gap-1">
                                        <button class="btn-sm-action btn-sm-edit menu-edit-btn" title="Edit"
                                                th:data-id="${item.id}"
                                                th:data-name="${item.name ?: ''}"
                                                th:data-price="${item.price ?: 0.0}"
                                                th:data-category-id="${item.categoryId ?: ''}"
                                                th:data-image-url="${item.imageUrl ?: ''}"
                                                th:data-description="${item.description ?: ''}"
                                                th:data-available="${item.available ?: false}">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <form th:if="${item.id != null}" th:action="@{/menu/item/delete/{id}(id=${item.id})}" method="post" style="display:inline;">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn-sm-action btn-sm-delete" onclick="return confirm('Delete?')">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${menuItems == null or #lists.isEmpty(menuItems)}" class="col-12" style="text-align:center;padding:40px;color:#6c757d;">
                        <i class="fas fa-utensils fa-3x mb-3" style="opacity:.3;display:block;"></i>
                        No menu items found.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Menu Item Modal -->
<div class="modal fade" id="addItemModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;">
                <h5 class="modal-title" style="font-weight:700;" id="itemModalTitle">Add Menu Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/menu/item/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="id" id="itemId"/>
                <div class="modal-body" style="padding:24px;">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">Item Name *</label>
                            <input type="text" name="name" id="itemName" class="form-control-custom" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Price *</label>
                            <input type="number" name="price" id="itemPrice" class="form-control-custom" step="0.01" min="0" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Category</label>
                            <select name="categoryId" id="itemCategory" class="form-control-custom">
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Cat</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Image URL</label>
                            <input type="text" name="imageUrl" id="itemImage" class="form-control-custom" placeholder="https://..."/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Prep Time (min)</label>
                            <input type="number" name="preparationTime" class="form-control-custom" value="15"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Branch</label>
                            <input type="text" name="branch" class="form-control-custom" value="Main Branch"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label-custom">Description</label>
                            <textarea name="description" id="itemDesc" class="form-control-custom" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;">
                                <input type="checkbox" name="available" id="itemAvail" value="true" checked style="accent-color:#6f42c1;width:16px;height:16px;"/>
                                Available on Menu
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:14px 20px;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save Item</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Add Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius:14px;">
            <div class="modal-header" style="padding:16px 20px;"><h5 style="font-weight:700;margin:0;">Add Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/menu/category/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body" style="padding:20px;">
                    <div class="mb-3"><label class="form-label-custom">Category Name</label>
                        <input type="text" name="name" class="form-control-custom" required/></div>
                    <div class="mb-3"><label class="form-label-custom">Description</label>
                        <input type="text" name="description" class="form-control-custom"/></div>
                    <input type="hidden" name="branch" value="Main Branch"/>
                </div>
                <div class="modal-footer" style="border-top:1px solid #e2e8f0;padding:12px 20px;">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary-custom">Save Category</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
$(document).on('click', '.menu-edit-btn', function() {
    const el = this;
    editItem(
        el.dataset.id,
        el.dataset.name,
        el.dataset.price,
        el.dataset.categoryId,
        el.dataset.imageUrl,
        el.dataset.description,
        el.dataset.available === 'true'
    );
});

$(document).on('error', '.menu-item-img', function() {
    this.src = 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=300';
});

function editItem(id, name, price, categoryId, imageUrl, description, available) {
    document.getElementById('itemId').value = id;
    document.getElementById('itemName').value = name;
    document.getElementById('itemPrice').value = price;
    document.getElementById('itemCategory').value = categoryId;
    document.getElementById('itemImage').value = imageUrl;
    document.getElementById('itemDesc').value = description;
    document.getElementById('itemAvail').checked = available;
    document.getElementById('itemModalTitle').textContent = 'Edit Menu Item';
    new bootstrap.Modal(document.getElementById('addItemModal')).show();
}
</script>
</body>
</html>
