<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!-- ========================== NAVBAR FRAGMENT ========================== -->
<nav th:fragment="navbar" class="top-navbar">
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="navbar-left">
        <!-- Mobile hamburger -->
        <button class="hamburger-btn" id="hamburgerBtn">
            <i class="fas fa-bars"></i>
        </button>
        <div>
            <h6 class="page-title mb-0" th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h6>
            <div class="breadcrumb-custom">
                <a href="/admin/dashboard"><i class="fas fa-home"></i></a>
                <span>/</span>
                <span th:text="${pageTitle}">Page</span>
            </div>
        </div>
    </div>
    <div class="navbar-right">
        <!-- Search -->
        <div class="dropdown">
            <div class="navbar-icon-btn dropdown-toggle" data-bs-toggle="dropdown" title="Search" style="cursor:pointer;" aria-expanded="false">
                <i class="fas fa-search"></i>
            </div>
            <div class="dropdown-menu dropdown-menu-end p-2" style="width:250px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,.12);border:none;">
                <form action="/admin/dashboard" method="get">
                    <input type="text" name="q" class="form-control-custom" placeholder="Quick search..." autofocus/>
                </form>
            </div>
        </div>
        <!-- Notifications -->
        <div class="dropdown">
            <div class="navbar-icon-btn dropdown-toggle" data-bs-toggle="dropdown" title="Notifications" style="cursor:pointer;" aria-expanded="false">
                <i class="fas fa-bell"></i>
                <span class="badge-dot" id="notif-dot"></span>
            </div>
            <ul class="dropdown-menu dropdown-menu-end p-0" style="width:300px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,.12);border:none;">
                <li class="p-3 border-bottom d-flex justify-content-between align-items-center">
                    <span style="font-weight:700;">Notifications</span>
                    <span style="font-size:11px;color:#6f42c1;cursor:pointer;">Mark all read</span>
                </li>
                <li><a class="dropdown-item p-3 border-bottom" href="#"><div style="font-size:13px;font-weight:600;">New Order #1002</div><div style="font-size:11px;color:#6c757d;">Just now</div></a></li>
                <li><a class="dropdown-item p-3 border-bottom" href="#"><div style="font-size:13px;font-weight:600;">Low Stock: Chicken</div><div style="font-size:11px;color:#6c757d;">2 hours ago</div></a></li>
                <li><a class="dropdown-item p-3 text-center" href="#" style="font-size:12px;color:#6f42c1;font-weight:600;">View All</a></li>
            </ul>
        </div>
        <!-- Kitchen -->
        <a href="/kitchen" class="navbar-icon-btn" title="Kitchen Display">
            <i class="fas fa-fire"></i>
        </a>
        <!-- User Dropdown -->
        <div class="dropdown">
            <div class="user-avatar dropdown-toggle" data-bs-toggle="dropdown" style="cursor:pointer;">
                <span sec:authentication="name" style="font-size:11px;">A</span>
            </div>
            <ul class="dropdown-menu dropdown-menu-end" style="border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 8px 25px rgba(0,0,0,.12);min-width:200px;">
                <li class="px-3 py-2 border-bottom">
                    <div style="font-size:13px;font-weight:700;" sec:authentication="name">User</div>
                    <div style="font-size:11px;color:#6c757d;" sec:authentication="name">email</div>
                </li>
                <li><a class="dropdown-item py-2" href="#"><i class="fas fa-user-circle me-2" style="color:#6f42c1;"></i> Profile</a></li>
                <li><a class="dropdown-item py-2" href="/settings/content"><i class="fas fa-cog me-2" style="color:#6f42c1;"></i> Settings</a></li>
                <li><hr class="dropdown-divider"/></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="dropdown-item py-2 text-danger">
                            <i class="fas fa-sign-out-alt me-2"></i> Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
    <!-- Sidebar toggle script -->
    <script src="/static/js/navbar.js"></script>
</nav>
</body>
</html>
